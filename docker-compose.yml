version: "3.9"

services:
  # ─────────────────────────────
  # PostgreSQL Database
  # ─────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: sia_hms_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sia_hms_db}
      POSTGRES_USER: ${POSTGRES_USER:-sia_hms_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sia_hms_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - hms_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sia_hms_user} -d ${POSTGRES_DB:-sia_hms_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────
  # Redis
  # ─────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sia_hms_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - hms_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────
  # MinIO (S3-compatible storage)
  # ─────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: sia_hms_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-sia_minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-sia_minio_password}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - hms_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ─────────────────────────────
  # Django Backend
  # ─────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sia_hms_backend
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate --no-input &&
             python manage.py collectstatic --no-input &&
             gunicorn config.asgi:application -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000"
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
    volumes:
      - ./backend:/app
      - static_files:/app/staticfiles
      - media_files:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - hms_network

  # ─────────────────────────────
  # Celery Worker
  # ─────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sia_hms_celery_worker
    restart: unless-stopped
    command: celery -A config worker -l info --concurrency=4
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis
    networks:
      - hms_network

  # ─────────────────────────────
  # Celery Beat (Scheduler)
  # ─────────────────────────────
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sia_hms_celery_beat
    restart: unless-stopped
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis
    networks:
      - hms_network

  # ─────────────────────────────
  # Next.js Frontend
  # ─────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sia_hms_frontend
    restart: unless-stopped
    command: npm run dev
    env_file:
      - .env
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - hms_network

  # ─────────────────────────────
  # Nginx Reverse Proxy
  # ─────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: sia_hms_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_files:/app/staticfiles:ro
    depends_on:
      - backend
      - frontend
    networks:
      - hms_network

# ─────────────────────────────
# Networks
# ─────────────────────────────
networks:
  hms_network:
    driver: bridge

# ─────────────────────────────
# Volumes
# ─────────────────────────────
volumes:
  postgres_data:
  redis_data:
  minio_data:
  static_files:
  media_files:
