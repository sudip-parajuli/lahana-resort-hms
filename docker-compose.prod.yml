version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: sia_hms_db_prod
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - hms_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sia_hms_redis_prod
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - hms_network

  minio:
    image: minio/minio:latest
    container_name: sia_hms_minio_prod
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - hms_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: sia_hms_backend_prod
    restart: always
    command: >
      sh -c "python manage.py migrate --no-input &&
             python manage.py collectstatic --no-input &&
             gunicorn config.asgi:application -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 --timeout 120"
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hms_network

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: sia_hms_celery_worker_prod
    restart: always
    command: celery -A config worker -l info --concurrency=4 -Q default,notifications,reports
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    depends_on:
      - db
      - redis
    networks:
      - hms_network

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: sia_hms_celery_beat_prod
    restart: always
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    depends_on:
      - db
      - redis
    networks:
      - hms_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: sia_hms_frontend_prod
    restart: always
    env_file:
      - .env
    networks:
      - hms_network

  nginx:
    image: nginx:alpine
    container_name: sia_hms_nginx_prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - static_files:/app/staticfiles:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend
    networks:
      - hms_network

networks:
  hms_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  static_files:
  media_files:
