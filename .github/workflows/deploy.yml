name: CI/CD — Lahana Resort PMS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ────────────────────────────────────────────────────────────
  # Tests & Type Checking
  # ────────────────────────────────────────────────────────────
  test-and-typecheck:
    name: Run Tests & Type Checks
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: lahana_test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Backend Pipeline
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Pip Packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements/base.txt') }}

      - name: Install Backend Dependencies
        run: |
          cd backend
          pip install -r requirements/base.txt
          pip install pytest pytest-django pytest-cov faker

      - name: Run Django Tests
        env:
          DJANGO_SETTINGS_MODULE: config.settings.development
          DEPLOYMENT_MODE: single_tenant
          POSTGRES_DB: lahana_test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/1
          DJANGO_SECRET_KEY: ci-testing-secret-key-not-for-production-use
        run: |
          cd backend
          pytest -v

      # Frontend Pipeline
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci

      - name: TypeScript Type Check
        run: |
          cd frontend
          npx tsc --noEmit

  # ────────────────────────────────────────────────────────────
  # Continuous Deployment (Only on pushes to main)
  # ────────────────────────────────────────────────────────────
  deploy-to-vps:
    name: Deploy to VPS Server
    runs-on: ubuntu-latest
    needs: [test-and-typecheck]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH Command
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.LAHANA_VPS_HOST }}
          username: ${{ secrets.LAHANA_VPS_USER }}
          key: ${{ secrets.LAHANA_VPS_SSH_KEY }}
          script: |
            cd /opt/lahana-resort-hms
            git pull origin main
            
            # Rebuild and start production services
            docker compose -f docker-compose.prod.yml up --build -d backend frontend celery_worker celery_beat
            
            # Run db migrations
            docker compose -f docker-compose.prod.yml exec -T backend python manage.py migrate --no-input
            
            # Gather static assets for nginx proxying
            docker compose -f docker-compose.prod.yml exec -T backend python manage.py collectstatic --no-input
            
            # Refresh Nginx reverse proxy
            systemctl restart nginx

      - name: Send Completion Notification SMS
        if: success()
        run: |
          curl -s -X POST https://api.sparrowsms.com/v2/sms/ \
            -d "token=${{ secrets.SPARROW_SMS_TOKEN }}" \
            -d "from=LahanaRes" \
            -d "to=${{ secrets.SUDIP_PHONE }}" \
            -d "text=Lahana Resort PMS has been successfully deployed to production! ✅"
