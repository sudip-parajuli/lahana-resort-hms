name: CI/CD — SIA HMS

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────
  # Backend CI
  # ─────────────────────────────
  backend-ci:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sia_hms_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements/development.txt') }}

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements/development.txt

      - name: Run Django tests
        env:
          DJANGO_SETTINGS_MODULE: config.settings.development
          POSTGRES_DB: sia_hms_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/1
          DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
        run: |
          cd backend
          pytest --cov=apps --cov-report=xml --cov-fail-under=70 -v

      - name: Upload coverage report
        uses: codecov/codecov-action@v3
        if: always()
        with:
          file: backend/coverage.xml

  # ─────────────────────────────
  # Frontend CI
  # ─────────────────────────────
  frontend-ci:
    name: Frontend Type Check & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: TypeScript type check
        run: |
          cd frontend
          npx tsc --noEmit

      - name: Run frontend tests
        run: |
          cd frontend
          npm run test -- --run

  # ─────────────────────────────
  # Deploy to Production (main only)
  # ─────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PROD_SERVER_HOST }}
          username: ${{ secrets.PROD_SERVER_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            /opt/sia-hms/deploy.sh

      - name: Notify deployment success
        if: success()
        run: |
          echo "✅ Production deployment successful"
          # Sparrow SMS notification would be triggered from deploy.sh

  # ─────────────────────────────
  # Deploy to Staging (staging only)
  # ─────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'

    steps:
      - name: Deploy to Staging via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.STAGING_SERVER_HOST }}
          username: ${{ secrets.STAGING_SERVER_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            /opt/sia-hms-staging/deploy.sh
