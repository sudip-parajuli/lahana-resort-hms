[pytest]
DJANGO_SETTINGS_MODULE = config.settings.development
python_files = tests/*.py tests/**/*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow tests (skip in CI if needed)

[coverage:run]
source = apps
omit =
    */migrations/*
    */tests/*
    */__init__.py
    */admin.py

[coverage:report]
show_missing = True
skip_covered = False
